# Rule Status Registry v1.0
#
# 轻量 Registry：记录每条规则的生命周期状态。
# 不是 runtime registry，不参与 context projection。
# 功能：区分 "规则存在" vs "规则生效"。
#
# status 取值：
#   recorded   — 事件已记录，未生成候选
#   candidate  — 候选已生成，待确认
#   approved   — 已确认，待激活
#   active     — 已加入生效链（当前仅在 SOUL.md / 系统提示中生效）
#
# active_in_context: true / false
#   当前运行时上下文中该规则是否实际加载。

rules:

